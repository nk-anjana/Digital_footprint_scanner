version: "3.9"

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root@123
      MYSQL_DATABASE: osint_db
    ports:
      - "3306:3306"

  api:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    environment:
      # These variables tell the API to connect to the Docker containers 
      # instead of looking for them on "localhost"
      - DB_HOST=mysql
      - REDIS_URL=redis://redis:6379/0

  worker:
    build: .
    command: celery -A backend.celery_worker.celery_app worker --loglevel=info
    depends_on:
      - mysql
      - redis
    environment:
      # The worker also needs to know where the database and redis are
      - DB_HOST=mysql
      - REDIS_URL=redis://redis:6379/0